name: Weekly Pipeline Delta
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Post approved narrative to leadership channel'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
permissions:
  contents: write
jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate pipeline delta draft
        run: python -m compliance.pipeline_delta
        env:
          HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HUBSPOT_PORTAL_ID:    ${{ secrets.HUBSPOT_PORTAL_ID }}
          SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
      - name: Commit updated pipeline snapshot
        run: |
          git config user.email "pipeline-bot@gtm-intelligence.com"
          git config user.name  "GTM Pipeline Bot"
          git add compliance/pipeline_snapshot.json compliance/pipeline_delta_draft.json
          git diff --staged --quiet \
            || git commit -m "chore: update pipeline snapshot $(date -u +%Y-%m-%d)"
          git push
      - name: Upload draft artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-delta-draft-${{ github.run_id }}
          path: |
            compliance/pipeline_snapshot.json
            compliance/pipeline_delta_draft.json
  publish-to-leadership:
    needs: generate-draft
    runs-on: ubuntu-latest
    environment: leadership-approval
    if: ${{ github.event.inputs.publish == 'true' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Download draft artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-delta-draft-${{ github.run_id }}
          path: compliance/
      - name: Publish approved narrative to leadership
        run: python -m compliance.pipeline_delta --publish
        env:
          HUBSPOT_ACCESS_TOKEN:         ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
          HUBSPOT_PORTAL_ID:            ${{ secrets.HUBSPOT_PORTAL_ID }}
          SLACK_WEBHOOK_URL:            ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_LEADERSHIP_WEBHOOK_URL: ${{ secrets.SLACK_LEADERSHIP_WEBHOOK_URL }}
          GROQ_API_KEY:                 ${{ secrets.GROQ_API_KEY }}
